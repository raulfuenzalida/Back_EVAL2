name: Deploy Backend a AWS EC2

on:
  push:
    branches:
    - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/back_eval2:latest .

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/back_eval2:latest

    - name: Deploy to Backend via Bastion (Front)
      uses: appleboy/ssh-action@v1.0.3
      with:
          # --- DESTINO FINAL (BACKEND) ---
          host: ${{ secrets.EC2_HOST}}              # IP Privada del Back
          username: ${{ secrets.EC2_USER}} 
          key: ${{ secrets.EC2_SSH_KEY }} # Llave privada del Backend (.pem)
          
          # --- CONFIGURACIÓN DEL BASTIÓN (FRONTEND) ---
          proxy_host: ${{ secrets.EC2_FRONT_PUBLIC_IP }} # IP Pública del Front
          proxy_username: ${{ secrets.EC2_USER}} 
          proxy_key: ${{ secrets.EC2_FRONT_KEY }}       # Llave privada del Frontend (.pem)
          
          script: |
            
            # Comandos de Docker
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/back_eval2:latest
            sudo docker stop backend || true
            sudo docker rm backend || true
            sudo docker run -d \
              -p 3000:3000 \
              --env-file /home/ec2-user/.env \
              --name backend \
              ${{ secrets.DOCKERHUB_USERNAME }}/back_eval2:latest